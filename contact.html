<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Online Bazar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0A4020', light: '#145c32', accent: '#F39C12' } } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVBAR -->
    <nav class="sticky top-0 bg-white shadow-md z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black text-brand-dark tracking-tight">ONLINE<span class="text-brand-accent">BAZAR</span></a>
            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-brand-dark">Home</a>
                <a href="about.html" class="text-sm font-medium text-gray-600 hover:text-brand-dark">About</a>
                <a href="contact.html" class="text-sm font-semibold text-brand-dark border-b-2 border-brand-dark pb-1">Contact</a>
            </div>
        </div>
    </nav>

    <!-- CONTAINER MAP + FORM -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Left Info column -->
            <div class="space-y-6">
                <div>
                    <h1 class="text-3xl font-black text-brand-dark mb-2">Get In Touch</h1>
                    <p class="text-sm text-gray-500">Have questions about order status or corporate custom acquisitions?</p>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm space-y-4 text-sm">
                    <div class="flex items-start space-x-3">
                        <i class="fas fa-map-marker-alt text-brand-dark mt-1 w-5"></i>
                        <span>Corporate Office, Block 4, Business Center Sector, Karachi, Pakistan.</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-phone text-brand-dark w-5"></i>
                        <span>+92 (21) 111-222-333</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-envelope text-brand-dark w-5"></i>
                        <span>support@onlinebazar.com</span>
                    </div>
                </div>
                <!-- Mini Map Alternative placeholder -->
                <div class="bg-gray-200 h-48 rounded-xl flex items-center justify-center text-gray-400 text-xs font-semibold relative overflow-hidden uppercase tracking-widest">
                    <i class="fas fa-map-marked-alt text-4xl absolute opacity-10"></i> Map Location Placeholder
                </div>
            </div>

            <!-- Right Interactive Form column -->
            <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Message successfully logged. Our staff will reach out shortly.'); this.reset();">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Your Name</label>
                            <input type="text" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:bg-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Email Address</label>
                            <input type="email" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:bg-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Subject</label>
                        <input type="text" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Message Content</label>
                        <textarea rows="5" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:bg-white"></textarea>
                    </div>
                    <button type="submit" class="w-full sm:w-auto bg-brand-dark hover:bg-brand-light text-white font-bold px-8 py-3 rounded-lg shadow-md transition-colors text-sm uppercase tracking-wide">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-brand-dark text-white py-8 text-center text-xs border-t border-green-900">
        &copy; 2026 Online Bazar. Here for you.
    </footer>
</body>
</html>
