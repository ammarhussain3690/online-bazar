<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bazar | Home</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#059669', // Emerald 600
                            dark: '#047857',  // Emerald 700
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- --- HEADER / NAVIGATION --- -->
    <header class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
            <!-- Brand Logo -->
            <a href="#" class="text-xl font-black text-brand-dark flex items-center gap-2 flex-shrink-0">
                <i class="fas fa-shopping-bag"></i> Online Bazar
            </a>

            <!-- Live Search Bar -->
            <div class="flex-1 max-w-md relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <i class="fas fa-search text-xs"></i>
                </span>
                <input id="search-input" type="text" placeholder="Search product names here..." 
                    class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-light focus:border-transparent transition-all">
            </div>

            <!-- Cart Trigger Icon Button -->
            <button id="cart-toggle" class="relative p-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors text-gray-700">
                <i class="fas fa-shopping-cart text-base"></i>
                <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white font-bold text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-10">
        
        <!-- --- CATEGORIES SECTION --- -->
        <section id="categories-section">
            <h2 class="text-base font-black uppercase tracking-wider text-gray-400 mb-4 flex items-center gap-2">
                <i class="fas fa-th-large text-xs"></i> Browse Categories
            </h2>
            <div id="categories-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <!-- Dynamically populated via renderCategories() -->
            </div>
        </section>

        <!-- --- PRODUCTS MAIN SECTION --- -->
        <section id="featured-products" class="scroll-mt-20">
            <h2 class="text-base font-black uppercase tracking-wider text-gray-400 mb-6 flex items-center gap-2">
                <i class="fas fa-fire text-xs text-orange-500"></i> Hot Selling Products
            </h2>
            <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Dynamically populated via renderProducts() -->
            </div>
        </section>

    </main>

    <!-- --- SLIDING CART SIDEBAR --- -->
    <div id="cart-sidebar" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop Backdrop Overlay -->
        <div id="cart-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-xs"></div>
        
        <!-- Sidebar Panel Container -->
        <div class="absolute inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl flex flex-col justify-between animate-in slide-in-from-right duration-200">
            <!-- Cart Header -->
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="font-black text-gray-800 text-base flex items-center gap-2">
                    <i class="fas fa-shopping-basket text-brand-dark"></i> Your Cart Basket
                </h3>
                <button id="cart-close" class="p-1 hover:bg-gray-100 rounded-full text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <!-- Cart Items Container (Scrollable) -->
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Dynamically populated via updateCartUI() -->
            </div>

            <!-- Cart Footer Summary Panel -->
            <div class="p-4 border-t border-gray-200 bg-gray-50 space-y-4">
                <div class="flex items-center justify-between font-bold">
                    <span class="text-sm text-gray-600">Subtotal Amount:</span>
                    <span id="cart-subtotal" class="text-lg text-brand-dark font-black">Rs. 0</span>
                </div>
                <button onclick="alert('Proceeding to Checkout...')" class="w-full bg-brand-dark hover:bg-brand-light text-white font-bold py-3 px-4 rounded-xl shadow transition-colors flex items-center justify-center gap-2">
                    <span>Order via WhatsApp / Checkout</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- --- PRODUCT OVERLAY QUICK VIEW MODAL (WITH SLIDER) --- -->
    <div id="product-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <!-- Modal Backdrop -->
        <div id="modal-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-xs"></div>
        
        <!-- Modal Base Card Wrapper -->
        <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl relative z-10 grid grid-cols-1 md:grid-cols-2">
            <!-- Absolute Close Button -->
            <button id="modal-close" class="absolute top-3 right-3 z-20 w-8 h-8 bg-white/80 hover:bg-white text-gray-500 hover:text-gray-800 rounded-full shadow flex items-center justify-center transition-colors">
                <i class="fas fa-times text-sm"></i>
            </button>

            <!-- Left Grid Pane: Multi-Media Slider Component -->
            <div class="p-6 bg-gray-50 flex flex-col justify-between gap-4 border-r border-gray-100">
                <!-- Large Active Feature Container -->
                <div id="modal-main-img-container" class="relative w-full pt-[100%] rounded-xl shadow-inner bg-white overflow-hidden">
                    <img id="modal-main-img" src="" class="absolute inset-0 w-full h-full object-cover">
                    
                    <!-- Left Arrow Slider Controller -->
                    <button onclick="changeModalImage(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all">
                        <i class="fas fa-chevron-left text-xs"></i>
                    </button>
                    <!-- Right Arrow Slider Controller -->
                    <button onclick="changeModalImage(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>

                <!-- Small Row Item Navigation Thumbnails -->
                <div id="modal-thumbnails" class="grid grid-cols-4 gap-2">
                    <!-- Dynamically populated via renderThumbnails() -->
                </div>
            </div>

            <!-- Right Grid Pane: Structured Product Text Summary Content -->
            <div class="p-6 flex flex-col justify-between gap-6">
                <div class="space-y-3">
                    <span id="modal-cat" class="inline-block text-[10px] uppercase tracking-wider bg-green-50 text-brand-dark px-2.5 py-1 rounded-md font-extrabold">Category</span>
                    <h2 id="modal-title" class="text-base font-black text-gray-800 leading-tight">Product Title Text</h2>
                    <div id="modal-price" class="text-xl font-black text-brand-dark">Rs. 0</div>
                    <hr class="border-gray-100">
                    <p id="modal-desc" class="text-xs text-gray-500 leading-relaxed max-h-[180px] overflow-y-auto pr-1">Product Description details go here...</p>
                </div>

                <button id="modal-add-btn" class="w-full bg-brand-dark hover:bg-brand-light text-white font-bold py-3 px-4 rounded-xl shadow transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-shopping-cart text-xs"></i>
                    <span>Add Item to Order Basket</span>
                </button>
            </div>
        </div>
    </div>

    <!-- --- LINK APPLICATION SCRIPTS --- -->
    <script src="app.js"></script>
</body>
</html>
