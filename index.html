<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bazar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#4ade80',
                            dark: '#16a34a'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <!-- --- HEADER / NAVBAR --- -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <!-- Logo -->
            <a href="#" class="flex items-center space-x-2 flex-shrink-0">
                <div class="w-9 h-9 bg-brand-dark rounded-xl flex items-center justify-center text-white font-black text-xl shadow-md shadow-green-200">O</div>
                <span class="text-lg font-black tracking-tight text-gray-800">Online<span class="text-brand-dark">Bazar</span></span>
            </a>

            <!-- Search Bar -->
            <div class="flex-1 max-w-md relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="Search products..." class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-brand-dark focus:bg-white transition-all">
            </div>

            <!-- Cart Icon Button -->
            <button id="cart-toggle" class="relative w-10 h-10 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-xl flex items-center justify-center transition-colors">
                <i class="fas fa-shopping-basket text-gray-700 text-lg"></i>
                <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center shadow-sm">0</span>
            </button>
        </div>
    </header>

    <!-- --- MAIN CONTENT --- -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6 space-y-8">
        
        <!-- Categories Section -->
        <section>
            <h2 class="text-sm font-black text-gray-800 uppercase tracking-wider mb-4">Categories</h2>
            <div id="categories-grid" class="grid grid-cols-3 sm:grid-cols-6 gap-3">
                <!-- JavaScript handles category rendering here -->
            </div>
        </section>

        <!-- Products Section -->
        <section id="featured-products">
            <h2 class="text-sm font-black text-gray-800 uppercase tracking-wider mb-4">Featured Products</h2>
            <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- JavaScript handles product cards here -->
            </div>
        </section>
    </main>

    <!-- --- FOOTER --- -->
    <footer class="bg-white border-t border-gray-100 py-6 text-center text-xs text-gray-400">
        <p>&copy; 2026 Online Bazar. All rights reserved.</p>
    </footer>

    <!-- --- SHOPPING CART SIDEBAR --- -->
    <div id="cart-sidebar" class="fixed inset-0 z-50 hidden">
        <div id="cart-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col animate-slide-in">
            <!-- Cart Header -->
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-shopping-bag text-brand-dark"></i>
                    <h2 class="font-bold text-gray-800">Your Cart</h2>
                </div>
                <button id="cart-close" class="text-gray-400 hover:text-gray-600 text-lg"><i class="fas fa-times"></i></button>
            </div>
            <!-- Cart Items Container -->
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Cart items load here dynamically -->
            </div>
            <!-- Cart Footer -->
            <div class="p-4 border-t border-gray-100 bg-gray-50 space-y-4">
                <div class="flex items-center justify-between font-bold text-gray-800">
                    <span>Subtotal:</span>
                    <span id="cart-subtotal" class="text-brand-dark text-lg">Rs. 0</span>
                </div>
                <button class="w-full bg-brand-dark hover:bg-brand-light text-white font-bold py-3 rounded-xl shadow-md transition-colors flex items-center justify-center space-x-2">
                    <i class="fab fa-whatsapp"></i>
                    <span>Order via WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <!-- --- PRODUCT DETAIL MODAL (SLIDER) --- -->
    <div id="product-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div id="modal-overlay" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative z-10 animate-fade-in flex flex-col md:flex-row">
            <!-- Modal Close -->
            <button id="modal-close" class="absolute right-4 top-4 z-20 bg-white/80 hover:bg-white text-gray-500 w-8 h-8 rounded-full flex items-center justify-center shadow-sm border border-gray-100"><i class="fas fa-times"></i></button>
            
            <!-- Left Side: Image Slider Container -->
            <div class="w-full md:w-1/2 p-6 flex flex-col justify-center bg-gray-50">
                <div class="relative pt-[100%] w-full" id="modal-main-img-container">
                    <!-- Main Image or Video will render here dynamically -->
                </div>
                <!-- Navigation Arrows & Thumbnails Grid -->
                <div class="flex items-center justify-between mt-3 gap-2">
                    <button onclick="changeModalImage(-1)" class="w-8 h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center shadow-sm text-gray-600 hover:bg-gray-50"><i class="fas fa-chevron-left text-xs"></i></button>
                    <div id="modal-thumbnails" class="flex-1 grid grid-cols-4 gap-1.5 px-1">
                        <!-- Thumbnails injection -->
                    </div>
                    <button onclick="changeModalImage(1)" class="w-8 h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center shadow-sm text-gray-600 hover:bg-gray-50"><i class="fas fa-chevron-right text-xs"></i></button>
                </div>
            </div>

            <!-- Right Side: Content Details -->
            <div class="w-full md:w-1/2 p-6 flex flex-col justify-between border-t md:border-t-0 md:border-l border-gray-100">
                <div>
                    <span id="modal-cat" class="text-[10px] bg-green-50 text-brand-dark px-2 py-1 rounded-md font-bold uppercase tracking-wider block w-fit mb-2">Category</span>
                    <h2 id="modal-title" class="text-xl font-black text-gray-800 leading-tight mb-2">Product Title</h2>
                    <div id="modal-price" class="text-2xl font-black text-brand-dark mb-4">Rs. 0</div>
                    <hr class="border-gray-100 my-3">
                    <p id="modal-desc" class="text-gray-600 text-xs leading-relaxed whitespace-pre-line">Description details live here...</p>
                </div>
                <div class="mt-6">
                    <button id="modal-add-btn" class="w-full bg-brand-dark hover:bg-brand-light text-white font-bold py-3 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-colors">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Add To Cart</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Script Javascript connection -->
    <script src="app.js"></script>
</body>
</html>
